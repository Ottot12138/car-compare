<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热门车型对比 · 2026年7月</title>
<style>
/* ═══════════════════════════════════════════
   LIQUID GLASS · APPLE AESTHETIC
   ═══════════════════════════════════════════ */
:root {
  --bg:#e8eaf0;
  --bg-noise:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
  --surface:rgba(255,255,255,0.62);
  --surface-hover:rgba(255,255,255,0.78);
  --surface2:rgba(255,255,255,0.45);
  --glass-strong:rgba(255,255,255,0.72);
  --glass-sheet:rgba(255,255,255,0.88);
  --text:#1d1d1f;
  --text2:#86868b;
  --text3:#aeaeb2;
  --text4:#c7c7cc;
  --border:rgba(0,0,0,0.06);
  --border-glow:rgba(255,255,255,0.6);
  --blue:#007aff;
  --blue-glass:rgba(0,122,255,0.08);
  --green-glass:rgba(52,199,89,0.08);
  --orange-glass:rgba(255,149,0,0.08);
  --red:#ff3b30;
  --accent-phev:#007aff;
  --accent-ev:#34c759;
  --accent-ice:#ff9500;
  --radius-sm:10px;
  --radius-md:16px;
  --radius-lg:22px;
  --radius-xl:28px;
  --spring: cubic-bezier(0.22, 1.1, 0.36, 1);
  --spring-soft: cubic-bezier(0.34, 1.3, 0.64, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --shadow-glass: 0 0 0 0.5px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03), 0 4px 16px rgba(0,0,0,0.05);
  --shadow-glass-hover: 0 0 0 0.5px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.10);
  --shadow-sheet: 0 -8px 40px rgba(0,0,0,0.12), 0 -2px 8px rgba(0,0,0,0.06);
}

*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Helvetica Neue","Microsoft YaHei",sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.47059;
  letter-spacing:-.016em;
  min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(120,140,255,0.08),transparent 60%),
             radial-gradient(ellipse 50% 40% at 80% 80%,rgba(255,140,80,0.05),transparent 60%),
             var(--bg-noise);
  pointer-events:none;z-index:0;
}
body.detail-open{overflow:hidden}

.container{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:20px 28px 48px}

/* ═══ HEADER ═══ */
.header{text-align:center;padding:64px 16px 28px;position:relative}
.header h1{
  font-size:clamp(30px,5.5vw,46px);font-weight:700;
  letter-spacing:-.035em;line-height:1.1;
  background:linear-gradient(180deg,#1d1d1f 0%,#3a3a3f 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header .subtitle{
  color:var(--text2);margin-top:8px;font-size:15px;font-weight:440;
  letter-spacing:-.01em;
}

/* ═══ STATS ═══ */
.stats-bar{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0 24px;
}
.stat-item{
  background:var(--glass-strong);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:100px;padding:7px 18px;font-size:12px;color:var(--text2);
  font-weight:520;box-shadow:0 0 0 0.5px rgba(0,0,0,0.04),0 1px 3px rgba(0,0,0,0.03);
  transition:transform .2s var(--ease-out),box-shadow .2s var(--ease-out);
}
.stat-item:hover{transform:translateY(-1px);box-shadow:0 0 0 0.5px rgba(0,0,0,0.06),0 2px 8px rgba(0,0,0,0.06)}
.stat-item strong{color:var(--text);font-weight:640}

/* ═══ FILTER ═══ */
.filter-wrap{position:sticky;top:16px;z-index:50;margin-bottom:36px}
.filter-bar{
  display:flex;flex-wrap:wrap;gap:6px;justify-content:center;
  background:rgba(255,255,255,0.56);backdrop-filter:blur(28px) saturate(190%);-webkit-backdrop-filter:blur(28px) saturate(190%);
  border-radius:100px;padding:6px;
  box-shadow:0 0 0 0.5px rgba(0,0,0,0.05),0 2px 12px rgba(0,0,0,0.06);
  max-width:fit-content;margin:0 auto;
  transition:box-shadow .3s var(--ease-out);
}
.filter-bar:has(.filter-btn:hover){box-shadow:0 0 0 0.5px rgba(0,0,0,0.06),0 4px 20px rgba(0,0,0,0.10)}
.filter-btn{
  padding:9px 20px;border:none;background:transparent;border-radius:100px;
  cursor:pointer;font-size:13px;color:var(--text2);font-weight:540;
  white-space:nowrap;transition:all .28s var(--spring-soft);
  letter-spacing:-.01em;font-family:inherit;position:relative;
}
.filter-btn:hover{color:var(--text);background:rgba(0,0,0,0.03)}
.filter-btn.active{
  background:#1d1d1f;color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,0.18),0 0 0 0.5px rgba(0,0,0,0.1);
  transform:scale(1.04);
}
.filter-btn:active{transform:scale(.94);transition:transform .1s var(--ease-out)}

/* ═══ CARD GRID ═══ */
.card-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px;
  perspective:1200px;
}
.card-grid.stagger-in .card{
  opacity:0;transform:translateY(20px) scale(.96);
  animation:cardEnter .55s var(--spring) forwards;
}
@keyframes cardEnter{
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* ═══ CARD ═══ */
.card{
  background:var(--surface);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);
  border-radius:var(--radius-lg);padding:26px;cursor:pointer;
  box-shadow:var(--shadow-glass);border:0.5px solid var(--border);
  transition:all .4s var(--spring);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;gap:16px;
  transform-origin:center center;
}
.card::after{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(135deg,rgba(255,255,255,0.5) 0%,rgba(255,255,255,0) 50%,rgba(255,255,255,0.3) 100%);
  pointer-events:none;opacity:0;transition:opacity .4s var(--ease-out);
}
.card:hover{
  box-shadow:var(--shadow-glass-hover);
  transform:translateY(-3px) scale(1.01);
}
.card:hover::after{opacity:1}
.card:active{transform:scale(.97);transition:transform .12s var(--ease-out)}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  transition:height .3s var(--ease-out);
}
.card:hover::before{height:4px}
.card.phev::before{background:linear-gradient(90deg,#007aff,#5ac8fa)}
.card.ev::before{background:linear-gradient(90deg,#34c759,#30d158)}
.card.ice::before{background:linear-gradient(90deg,#ff9500,#ff9f0a)}

.card .c-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1}
.card .c-name{font-size:19px;font-weight:660;letter-spacing:-.028em;line-height:1.2}
.card .c-trim{font-size:12px;color:var(--text2);margin-top:3px;font-weight:440}
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:100px;font-size:11px;
  font-weight:620;letter-spacing:.01em;white-space:nowrap;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.badge.phev{background:rgba(0,122,255,0.1);color:#007aff}
.badge.ev{background:rgba(52,199,89,0.1);color:#248a3d}
.badge.ice{background:rgba(255,149,0,0.1);color:#c46e00}

.card .c-price{font-size:26px;font-weight:730;color:var(--red);letter-spacing:-.035em;position:relative;z-index:1}
.card .c-price .yen{font-size:16px;font-weight:580;margin-right:2px;opacity:.85}

.card .c-specs{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;position:relative;z-index:1}
.card .c-spec{display:flex;justify-content:space-between;align-items:baseline;font-size:12px}
.card .c-spec .l{color:var(--text3);font-weight:440}
.card .c-spec .v{font-weight:580;text-align:right;color:var(--text)}

.card .c-body{display:flex;gap:8px;align-items:center;position:relative;z-index:1}
.card .c-body .body-tag{
  font-size:11px;color:var(--text3);background:var(--surface2);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  padding:5px 12px;border-radius:100px;font-weight:500
}

.card .c-arrow{text-align:right;margin-top:auto;position:relative;z-index:1}
.card .c-arrow span{
  font-size:11px;color:var(--text4);font-weight:500;
  transition:color .3s,transform .3s var(--spring-soft);
  display:inline-block;
}
.card:hover .c-arrow span{color:var(--text2);transform:translateX(3px)}
.card .c-arrow span::after{content:' →';margin-left:2px}

/* ═══ DETAIL OVERLAY ═══ */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.32);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:flex-end;justify-content:center;
  visibility:hidden;opacity:0;transition:visibility .4s,opacity .4s var(--ease-out);
}
.overlay.show{visibility:visible;opacity:1}
.overlay.show .sheet{transform:translateY(0)}

.sheet{
  background:var(--glass-sheet);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);
  border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  width:100%;max-width:740px;max-height:90vh;overflow-y:auto;
  padding:0;transform:translateY(100%);
  transition:transform .48s cubic-bezier(0.22,1,0.36,1);
  box-shadow:var(--shadow-sheet);
  border:0.5px solid rgba(255,255,255,0.4);
}
.sheet::-webkit-scrollbar{width:3px}
.sheet::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:10px}
.sheet::-webkit-scrollbar-track{background:transparent}

.sheet-handle{
  display:flex;justify-content:center;padding:12px 0 0;
  position:sticky;top:0;z-index:5;
  background:var(--glass-sheet);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border-radius:var(--radius-xl) var(--radius-xl) 0 0;
}
.sheet-handle::before{
  content:'';width:40px;height:5px;background:rgba(0,0,0,0.15);border-radius:10px;
}

.sheet-head{
  padding:22px 32px 20px;position:relative;
  border-bottom:0.5px solid rgba(0,0,0,0.06);
}
.sheet-head .sh-name{font-size:26px;font-weight:710;letter-spacing:-.035em;line-height:1.15}
.sheet-head .sh-trim{font-size:14px;color:var(--text2);margin-top:4px;font-weight:440}
.sheet-head .sh-row{display:flex;gap:10px;align-items:center;margin-top:12px}
.sheet-close{
  position:absolute;top:18px;right:18px;width:36px;height:36px;border-radius:50%;
  border:none;background:rgba(0,0,0,0.06);
  cursor:pointer;font-size:18px;color:var(--text2);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:all .25s var(--spring-soft);
}
.sheet-close:hover{background:rgba(0,0,0,0.12);color:var(--text);transform:scale(1.08)}
.sheet-close:active{transform:scale(.9);transition:transform .1s var(--ease-out)}

.sheet-price{
  margin:0 32px;padding:18px 0;
  border-bottom:0.5px solid rgba(0,0,0,0.06);
  display:flex;align-items:baseline;gap:12px;
}
.sheet-price .sp-num{font-size:32px;font-weight:730;color:var(--red);letter-spacing:-.035em}
.sheet-price .sp-note{font-size:13px;color:var(--text3);font-weight:440}

.sheet-block{padding:20px 32px;border-bottom:0.5px solid rgba(0,0,0,0.05)}
.sheet-block .sb-label{
  font-size:10px;font-weight:660;color:var(--text3);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;
}
.sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 28px}
.sheet-grid .si{display:flex;justify-content:space-between;align-items:baseline;font-size:13px}
.sheet-grid .si .l{color:var(--text2);font-size:12px;font-weight:440}
.sheet-grid .si .v{font-weight:580;text-align:right;color:var(--text)}

.sheet-range{display:flex;gap:14px;padding:20px 32px;border-bottom:0.5px solid rgba(0,0,0,0.05)}
.sheet-range .rb{
  flex:1;text-align:center;padding:16px 10px;border-radius:var(--radius-md);
  background:var(--surface2);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:transform .3s var(--spring-soft),box-shadow .3s var(--ease-out);
}
.sheet-range .rb:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.06)}
.sheet-range .rb.blue{background:rgba(0,122,255,0.06);color:#007aff}
.sheet-range .rb.green{background:rgba(52,199,89,0.06);color:#248a3d}
.sheet-range .rb .n{font-size:28px;font-weight:720;display:block;letter-spacing:-.035em}
.sheet-range .rb .lbl{font-size:10px;color:var(--text3);margin-top:4px;font-weight:540}

.sheet-pc{padding:20px 32px;display:flex;gap:14px}
.sheet-pc .pc-col{flex:1;min-width:0}
.sheet-pc .pc-col .pc-title{font-size:13px;font-weight:660;margin-bottom:10px;letter-spacing:-.01em}
.sheet-pc .pc-col.pos .pc-title{color:var(--accent-ev)}
.sheet-pc .pc-col.neg .pc-title{color:var(--red)}
.sheet-pc .pc-col ul{list-style:none;padding:0}
.sheet-pc .pc-col li{
  font-size:12px;color:#4a4a52;padding:4px 0 4px 18px;
  position:relative;line-height:1.5;font-weight:440;
}
.sheet-pc .pc-col.pos li::before{
  content:'';position:absolute;left:0;top:9px;width:7px;height:7px;
  border-radius:50%;background:var(--accent-ev);
}
.sheet-pc .pc-col.neg li::before{
  content:'';position:absolute;left:0;top:9px;width:7px;height:7px;
  border-radius:50%;background:var(--red);opacity:.7;
}

.sheet-foot{height:36px;background:var(--glass-sheet);border-radius:0 0 var(--radius-xl) var(--radius-xl)}

/* ═══ TABLE ═══ */
.table-section{margin-top:56px;padding-top:36px;border-top:0.5px solid rgba(0,0,0,0.06);position:relative}
.table-section h2{font-size:22px;font-weight:680;text-align:center;letter-spacing:-.025em}
.table-section .table-note{text-align:center;font-size:12px;color:var(--text3);margin:6px 0 20px}
.table-wrap{
  overflow-x:auto;background:var(--surface);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:var(--radius-lg);box-shadow:var(--shadow-glass);border:0.5px solid var(--border);
}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:1200px}
thead th{
  background:rgba(0,0,0,0.02);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  padding:14px 10px;font-weight:640;font-size:11px;color:var(--text2);
  letter-spacing:.03em;border-bottom:1px solid rgba(0,0,0,0.06);
  position:sticky;top:0;z-index:3;white-space:nowrap;text-align:center;
}
thead th:first-child{
  position:sticky;left:0;z-index:4;background:rgba(245,245,247,0.9);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  min-width:120px;text-align:left;
}
tbody td{
  padding:11px 10px;border-bottom:0.5px solid rgba(0,0,0,0.04);
  vertical-align:middle;text-align:center;font-weight:440;
}
tbody td:first-child{
  font-weight:600;white-space:nowrap;position:sticky;left:0;
  background:var(--surface);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  z-index:2;text-align:left;color:var(--text2);font-size:11px;
}
tbody tr{transition:background .2s}
tbody tr:hover td{background:rgba(0,0,0,0.02)}
tbody tr:hover td:first-child{background:rgba(255,255,255,0.82)}
.car-col-name{font-weight:630;font-size:13px;white-space:nowrap;display:block}
.car-col-price{color:var(--red);font-weight:660;white-space:nowrap}

/* ═══ FOOTER ═══ */
.footer{text-align:center;padding:48px 16px 32px;color:var(--text3);font-size:12px;line-height:1.9;font-weight:440}

/* ═══ RESPONSIVE ═══ */
@media(max-width:720px){
  .card-grid{grid-template-columns:1fr;gap:14px}
  .container{padding:12px 14px 36px}
  .header{padding-top:40px}
  .header h1{font-size:26px}
  .filter-bar{border-radius:var(--radius-lg);max-width:100%}
  .sheet{max-height:94vh}
  .sheet-head,.sheet-price,.sheet-block,.sheet-range,.sheet-pc{padding-left:22px;padding-right:22px}
  .sheet-grid{grid-template-columns:1fr 1fr;gap:8px 14px}
  .sheet-head .sh-name{font-size:22px}
  .sheet-price .sp-num{font-size:26px}
  .card{padding:22px}
  .card .c-price{font-size:23px}
}
@media print{
  body{background:#fff}
  body::before{display:none}
  .filter-wrap,.stats-bar,.footer{display:none}
  .card{break-inside:avoid;box-shadow:none;border:0.5px solid #ddd;backdrop-filter:none;-webkit-backdrop-filter:none}
  .card-grid{grid-template-columns:repeat(2,1fr);gap:12px}
}
</style>
</head>
<body>
<div class="container">

<header class="header">
  <h1>热门车型对比</h1>
  <div class="subtitle">落地价含购置税 + 保险 + 上牌 &nbsp;·&nbsp; 2026年7月 &nbsp;·&nbsp; 点击卡片查看详情</div>
</header>

<div class="stats-bar">
  <span class="stat-item">共 <strong>13</strong> 款</span>

</div>

  <div class="table-wrap" id="comparisonTable"></div>

<footer class="footer">

  <p>落地价参考近期车主真实成交价及经销商报价，实际价格以当地 4S 店为准</p>
</footer>

</div>

var C = [
  {
    id:"lynk10", n:"领克10 EM-P", t:"240 四驱 Ultra",

function badge(tp){
  var m={phev:['插混','phev'],ev:['纯电','ev'],ice:['燃油','ice']};
  var a=m[tp]||['',''];
  return '<span class="badge '+a[1]+'">'+a[0]+'</span>';
}

function cardKeySpecs(c){
  var specs=[];
  if(c.er!=='—') specs.push({l:'续航',v:c.er});
  if(c.ac) specs.push({l:'0-100',v:c.ac});
  if(c.tr!=='—'&&specs.length<2) specs.push({l:'综合续航',v:c.tr});
  if(specs.length<2&&c.pw) specs.push({l:'动力',v:c.pw.split('(')[0]});
  return specs;
}

function renderGrid(filter){
  filter=filter||'all';
  var list=C.filter(function(c){
    if(filter==='all') return true;
    if(filter==='phev'||filter==='ev'||filter==='ice') return c.tp===filter;
    if(filter==='sedan') return c.bd==='sedan';
    if(filter==='suv') return c.bd==='suv';
    if(filter==='wagon') return c.bd==='wagon'||c.bd==='hatchback';
    return true;
  });

  var grid=document.getElementById('cardGrid');
  grid.classList.remove('stagger-in');
  void grid.offsetWidth;
  grid.classList.add('stagger-in');

  grid.innerHTML=!list.length
    ?'<div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text3);font-size:15px;">没有匹配的车型</div>'
    :list.map(function(c,i){
      var ks=cardKeySpecs(c);
      return '<div class="card '+c.tp+'" data-id="'+c.id+'" onclick="showDetail(\''+c.id+'\')" style="animation-delay:'+(i*0.04)+'s">'
        +'<div class="c-top">'
        +  '<div><div class="c-name">'+c.n+'</div><div class="c-trim">'+c.t+'</div></div>'
        +  badge(c.tp)
        +'</div>'
        +'<div class="c-price"><span class="yen">¥</span>'+c.pr+'</div>'
        +'<div class="c-specs">'
        +  ks.map(function(s){return '<div class="c-spec"><span class="l">'+s.l+'</span><span class="v">'+s.v+'</span></div>';}).join('')
        +'</div>'
        +'<div class="c-body"><span class="body-tag">'+c.bl+' · '+c.dl+'</span></div>'
        +'<div class="c-arrow"><span>查看详情</span></div>'
        +'</div>';
    }).join('');
}

function showDetail(id){
  var c=C.find(function(x){return x.id===id;});
  if(!c) return;
  document.getElementById('overlay').classList.add('show');
  document.body.classList.add('detail-open');

  var html=''
    +'<div class="sheet-handle"></div>'
    +'<div class="sheet-head">'
    +  '<button class="sheet-close" onclick="hideDetail(event)" aria-label="关闭">&times;</button>'
    +  '<div class="sh-name">'+c.n+'</div>'
    +  '<div class="sh-trim">'+c.t+'</div>'
    +  '<div class="sh-row">'+badge(c.tp)+'<span style="font-size:11px;color:var(--text3);">'+c.bl+' · '+c.dl+'</span></div>'
    +'</div>'
    +'<div class="sheet-price"><span class="sp-num">¥'+c.pr+'</span><span class="sp-note">'+c.pn+'</span></div>'
    +'<div class="sheet-block">'
    +  '<div class="sb-label">基本参数</div>'
    +  '<div class="sheet-grid">'
    +    '<div class="si"><span class="l">长×宽×高</span><span class="v">'+c.ln+' × '+c.wd+' × '+c.ht+'</span></div>'
    +    '<div class="si"><span class="l">轴距</span><span class="v">'+c.wb+' mm</span></div>'
    +    '<div class="si"><span class="l">驱动方式</span><span class="v">'+c.dt+'</span></div>'
    +    '<div class="si"><span class="l">动力参数</span><span class="v">'+c.pw+'</span></div>'
    +    '<div class="si"><span class="l">0-100 加速</span><span class="v">'+c.ac+'</span></div>'
    +    '<div class="si"><span class="l">悬架系统</span><span class="v">'+c.su+'</span></div>'
    +  '</div>'
    +'</div>'
    +(c.er!=='—'||c.tr!=='—'
      ?'<div class="sheet-range">'
        +(c.er!=='—'?'<div class="rb blue"><span class="n">'+c.er+'</span><span class="lbl">纯电续航</span></div>':'')
        +(c.tr!=='—'?'<div class="rb green"><span class="n">'+c.tr+'</span><span class="lbl">综合续航</span></div>':'')
        +'</div>'
      :'')
    +(c.fc!=='—'
      ?'<div class="sheet-block"><div class="sb-label">能耗与电池</div><div class="sheet-grid"><div class="si"><span class="l">油耗 / 电耗</span><span class="v">'+c.fc+'</span></div><div class="si"><span class="l">电池</span><span class="v">'+c.ba+'</span></div></div></div>'
      :'')
    +'<div class="sheet-block"><div class="sb-label">智能配置</div><div style="font-size:12px;color:#4a4a52;font-weight:440;">'+c.sm+'</div></div>'
    +'<div class="sheet-pc">'
    +  '<div class="pc-col pos"><div class="pc-title">✓ 优点</div><ul>'+c.po.map(function(p){return '<li>'+p+'</li>';}).join('')+'</ul></div>'
    +  '<div class="pc-col neg"><div class="pc-title">✗ 不足</div><ul>'+c.co.map(function(p){return '<li>'+p+'</li>';}).join('')+'</ul></div>'
    +'</div>'
    +'<div class="sheet-foot"></div>';

  document.getElementById('sheet').innerHTML=html;
  document.getElementById('sheet').scrollTop=0;
  if(history.pushState) history.pushState(null,'','#'+c.id);
}

function hideDetail(e){
  if(e) e.stopPropagation();
  document.getElementById('overlay').classList.remove('show');
  document.body.classList.remove('detail-open');
  if(history.pushState) history.pushState(null,'',window.location.pathname);
}

document.getElementById('overlay').addEventListener('click',function(e){
  if(e.target===this) hideDetail(e);
});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape') hideDetail();
});

var touchY=0;
document.getElementById('sheet').addEventListener('touchstart',function(e){
  touchY=e.touches[0].clientY;
});
document.getElementById('sheet').addEventListener('touchmove',function(e){
  if(this.scrollTop>0) return;
  var dy=e.touches[0].clientY-touchY;
  if(dy>60) hideDetail(e);
});

window.addEventListener('popstate',function(){
  if(!location.hash) hideDetail();
  else{
    var id=location.hash.replace('#','');
    if(C.find(function(x){return x.id===id;})) showDetail(id);
  }
});

if(location.hash){
  var initId=location.hash.replace('#','');
  if(C.find(function(x){return x.id===initId;})) setTimeout(function(){showDetail(initId)},400);
}

function renderTable(){
  var cols=[
    {l:'动力类型',r:function(c){return badge(c.tp)}},
    {l:'车身',r:function(c){return c.bl}},
    {l:'落地价',r:function(c){return '<span class="car-col-price">'+c.pr+'</span>'}},
    {l:'长×宽×高 (mm)',r:function(c){return c.ln+' × '+c.wd+' × '+c.ht}},
    {l:'轴距 (mm)',r:function(c){return c.wb}},
    {l:'驱动方式',r:function(c){return c.dt}},
    {l:'动力参数',r:function(c){return c.pw}},
    {l:'0-100 加速',r:function(c){return c.ac}},
    {l:'纯电续航',r:function(c){return c.er}},
    {l:'综合续航',r:function(c){return c.tr}},
    {l:'油耗 / 电耗',r:function(c){return c.fc}},
    {l:'悬架',r:function(c){return c.su}},
    {l:'智能亮点',r:function(c){return c.sm}}
  ];
  var th='<thead><tr><th>参数项</th>'+C.map(function(c){return '<th><span class="car-col-name">'+c.n+'</span></th>';}).join('')+'</tr></thead>';
  var tb='<tbody>'+cols.map(function(col){return '<tr><td>'+col.l+'</td>'+C.map(function(c){return '<td>'+col.r(c)+'</td>';}).join('')+'</tr>';}).join('')+'</tbody>';
  document.getElementById('comparisonTable').innerHTML='<table>'+th+tb+'</table>';
}

document.querySelectorAll('.filter-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
    this.classList.add('active');
    renderGrid(this.dataset.filter);
  });
});

renderGrid();
renderTable();
</script>
</body>
</html>
