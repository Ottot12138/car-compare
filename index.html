<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热门车型对比 · 2026年7月</title>
<style>
/* ===========================================
   DESIGN SYSTEM — TYPOGRAPHY · COLOR · SPACE
   =========================================== */

/* ----- Design Tokens: Light Mode ----- */
:root {
  /* Neutral gray scale (9 stops) */
  --gray-50:  #f8f7f5;
  --gray-100: #f0eeeb;
  --gray-200: #e6e3df;
  --gray-300: #d4d1cc;
  --gray-400: #b0aca5;
  --gray-500: #8b8780;
  --gray-600: #65615b;
  --gray-700: #45413c;
  --gray-800: #252320;
  --gray-900: #141311;

  /* Semantic aliases */
  --bg:            var(--gray-50);
  --surface:       #ffffff;
  --surface-hover: var(--gray-100);
  --border:        var(--gray-200);
  --border-light:  rgba(0,0,0,0.05);

  --text-primary:   var(--gray-800);
  --text-secondary: var(--gray-600);
  --text-tertiary:  var(--gray-500);
  --text-quaternary: var(--gray-400);

  /* Accent — muted steel blue, <5% page coverage */
  --accent:        #4e7d96;
  --accent-hover:  #3c6176;
  --accent-text:   #3d6177;
  --accent-bg:     #edf3f7;
  --accent-border: #d0dde6;

  /* Semantic colors */
  --positive:      #4a8c5c;
  --positive-bg:   #edf4ef;
  --negative:      #b55a4a;
  --negative-bg:   #f9f2f0;
  --price-color:   #b84d3e;

  /* Badge variants — low saturation */
  --phev-text: #3d6d8c;
  --phev-bg:   #e8f0f7;
  --ev-text:   #3d7048;
  --ev-bg:     #e8f2eb;
  --ice-text:  #8c6d3d;
  --ice-bg:    #f5efe4;

  /* Typography scale */
  --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
  --font-mono: "SF Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
  --fs-hero:   clamp(2rem, 5vw, 2.75rem);
  --fs-h2:     clamp(1.25rem, 3vw, 1.625rem);
  --fs-body:   1rem;
  --fs-small:  0.875rem;
  --fs-caption: 0.8125rem;
  --fs-tiny:   0.75rem;
  --lh-body:   1.65;
  --lh-heading: 1.2;
  --lh-tight:  1.15;

  /* Spacing scale (4px base) */
  --space-xs:  4px;
  --space-sm:  8px;
  --space-md:  16px;
  --space-lg:  24px;
  --space-xl:  32px;
  --space-2xl: 48px;
  --space-3xl: 64px;

  /* Radius */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;

  /* Shadows — extremely subtle */
  --shadow-card:    0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px var(--border);
  --shadow-card-hover: 0 2px 8px rgba(0,0,0,0.06), 0 0 0 1px var(--border);
  --shadow-sheet:   0 -4px 20px rgba(0,0,0,0.10);
  --shadow-overlay: none;

  /* Transitions */
  --ease-fast:   cubic-bezier(0.4, 0, 0.2, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --dur-micro:   150ms;
  --dur-fast:    200ms;
  --dur-normal:  300ms;
  --dur-slow:    400ms;

  /* Layout */
  --content-max: 1280px;
  --text-max:    680px;
}

/* ----- Design Tokens: Dark Mode ----- */
@media (prefers-color-scheme: dark) {
  :root {
    --gray-50:  #1a1c1e;
    --gray-100: #212325;
    --gray-200: #2c2e30;
    --gray-300: #3a3c3f;
    --gray-400: #5c5e61;
    --gray-500: #8a8c8e;
    --gray-600: #b0b2b3;
    --gray-700: #c8c9ca;
    --gray-800: #e2e3e3;
    --gray-900: #f0f0f1;

    --surface:       #242628;
    --surface-hover: #2a2c2e;
    --border:        var(--gray-200);
    --border-light:  rgba(255,255,255,0.06);

    --accent:        #6b9db8;
    --accent-hover:  #89b4cc;
    --accent-text:   #89b4cc;
    --accent-bg:     #1e2a32;
    --accent-border: #2a3a45;

    --positive:      #5c9e6e;
    --positive-bg:   #1e2a22;
    --negative:      #c57060;
    --negative-bg:   #2a201e;
    --price-color:   #c57060;

    --phev-text: #7babc7;
    --phev-bg:   #1e2a33;
    --ev-text:   #6daa7e;
    --ev-bg:     #1e2a22;
    --ice-text:  #bb9a60;
    --ice-bg:    #2a2418;

    --shadow-card:      0 1px 2px rgba(0,0,0,0.20), 0 0 0 1px var(--border);
    --shadow-card-hover: 0 2px 8px rgba(0,0,0,0.30), 0 0 0 1px var(--border);
    --shadow-sheet:     0 -4px 20px rgba(0,0,0,0.35);
  }
}

/* ===========================================
   RESET & BASE
   =========================================== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  scroll-behavior:smooth;
  text-rendering:optimizeLegibility;
}
body{
  font-family:var(--font-sans);
  font-size:var(--fs-body);
  font-weight:400;
  line-height:var(--lh-body);
  color:var(--text-primary);
  background:var(--bg);
  min-height:100vh;
  -webkit-tap-highlight-color:transparent;
}
body.detail-open{overflow:hidden}

/* ===========================================
   TYPOGRAPHY HIERARCHY
   Level 1: Hero title — w600+large+dark
   Level 2: Section heading — w600+medium
   Level 3: Body — w400+16px
   Level 4: Caption — w400+small+tertiary
   =========================================== */
h1,h2,h3,h4{font-weight:600;line-height:var(--lh-heading);letter-spacing:-0.02em}
h1{font-size:var(--fs-hero);letter-spacing:-0.03em}
h2{font-size:var(--fs-h2)}
p{margin-bottom:0.75em}
p:last-child{margin-bottom:0}

/* ===========================================
   LAYOUT
   =========================================== */
.container{
  position:relative;
  max-width:var(--content-max);
  margin:0 auto;
  padding:0 var(--space-lg) var(--space-2xl);
}

/* ===========================================
   HEADER
   =========================================== */
.header{
  text-align:center;
  padding:var(--space-3xl) var(--space-md) var(--space-lg);
}
.header h1{
  color:var(--text-primary);
  max-width:var(--text-max);
  margin:0 auto;
}
.header .subtitle{
  color:var(--text-tertiary);
  margin-top:var(--space-sm);
  font-size:var(--fs-small);
  font-weight:400;
}

/* ===========================================
   STATS BAR
   =========================================== */
.stats-bar{
  display:flex;flex-wrap:wrap;gap:var(--space-sm);
  justify-content:center;
  margin:var(--space-md) 0 var(--space-lg);
}
.stat-item{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:100px;
  padding:6px 16px;
  font-size:var(--fs-caption);
  color:var(--text-secondary);
  font-weight:400;
  transition:border-color var(--dur-micro) var(--ease-fast);
}
.stat-item strong{color:var(--text-primary);font-weight:600}

/* ===========================================
   FILTER BAR
   =========================================== */
.filter-wrap{
  position:sticky;top:var(--space-md);z-index:50;
  margin-bottom:var(--space-xl);
}
.filter-bar{
  display:flex;flex-wrap:wrap;gap:var(--space-xs);
  justify-content:center;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:5px;
  max-width:fit-content;margin:0 auto;
  transition:border-color var(--dur-fast) var(--ease-fast);
}
.filter-bar:hover{border-color:var(--gray-300)}
.filter-btn{
  padding:8px 18px;border:none;background:transparent;
  border-radius:var(--radius-sm);
  cursor:pointer;font-size:var(--fs-caption);color:var(--text-secondary);
  font-weight:500;white-space:nowrap;
  transition:all var(--dur-fast) var(--ease-fast);
  font-family:inherit;position:relative;
  outline-offset:2px;
}
.filter-btn:hover{color:var(--text-primary);background:var(--surface-hover)}
.filter-btn.active{
  background:var(--text-primary);color:var(--bg);
}
.filter-btn:active{transform:scale(0.96);transition:transform 0.1s}

/* ===========================================
   CARD GRID — 12-column responsive
   =========================================== */
.card-grid{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:var(--space-md);
}
.card-grid.stagger-in .card{}
.card-grid.stagger-in .card.revealed{}

/* ===========================================
   CARD
   =========================================== */
.card{
  grid-column:span 4;
  background:var(--surface);
  border-radius:var(--radius-lg);
  padding:var(--space-lg);
  cursor:pointer;
  box-shadow:var(--shadow-card);
  transition:box-shadow var(--dur-fast) var(--ease-fast),
             transform var(--dur-fast) var(--ease-fast);
  position:relative;
  display:flex;flex-direction:column;gap:var(--space-md);
  outline-offset:2px;
  /* Scroll reveal initial state */
  opacity:0;transform:translateY(16px);
  transition:opacity var(--dur-normal) var(--ease-fast),
             transform var(--dur-normal) var(--ease-fast),
             box-shadow var(--dur-fast) var(--ease-fast);
}
.card.revealed{opacity:1;transform:translateY(0)}
.card:hover{
  box-shadow:var(--shadow-card-hover);
  transform:translateY(-2px);
}
.card.revealed:hover{transform:translateY(-2px)}
.card:active{transform:scale(0.98);transition:transform 0.1s}

/* Type indicator line */
.card::before{
  content:'';position:absolute;top:0;left:var(--space-lg);right:var(--space-lg);
  height:2px;border-radius:0 0 2px 2px;
  transition:opacity var(--dur-fast);
  opacity:0.6;
}
.card:hover::before{opacity:1}
.card.phev::before{background:var(--accent)}
.card.ev::before{background:var(--positive)}
.card.ice::before{background:var(--ice-text)}

/* Card internals */
.card .c-top{
  display:flex;justify-content:space-between;align-items:flex-start;
  position:relative;z-index:1;
}
.card .c-name{
  font-size:1.0625rem;font-weight:600;letter-spacing:-0.015em;
  line-height:var(--lh-tight);color:var(--text-primary);
}
.card .c-trim{
  font-size:var(--fs-caption);color:var(--text-tertiary);
  margin-top:3px;font-weight:400;
}

/* Badges */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:100px;font-size:var(--fs-tiny);
  font-weight:600;letter-spacing:0.02em;white-space:nowrap;
  line-height:1.4;
}
.badge.phev{background:var(--phev-bg);color:var(--phev-text)}
.badge.ev{background:var(--ev-bg);color:var(--ev-text)}
.badge.ice{background:var(--ice-bg);color:var(--ice-text)}

.card .c-price{
  font-size:1.5rem;font-weight:650;color:var(--price-color);
  letter-spacing:-0.03em;position:relative;z-index:1;
  font-variant-numeric:tabular-nums;
}
.card .c-price .yen{font-size:0.875rem;font-weight:500;margin-right:1px;opacity:0.85}

.card .c-specs{
  display:grid;grid-template-columns:1fr 1fr;gap:var(--space-xs) var(--space-md);
  position:relative;z-index:1;
}
.card .c-spec{display:flex;justify-content:space-between;align-items:baseline;font-size:var(--fs-caption)}
.card .c-spec .l{color:var(--text-tertiary);font-weight:400}
.card .c-spec .v{font-weight:550;text-align:right;color:var(--text-primary);font-variant-numeric:tabular-nums}

.card .c-body{display:flex;gap:var(--space-sm);align-items:center;position:relative;z-index:1}
.card .c-body .body-tag{
  font-size:var(--fs-caption);color:var(--text-secondary);background:var(--surface-hover);
  padding:4px 12px;border-radius:100px;font-weight:400
}

.card .c-arrow{text-align:right;margin-top:auto;position:relative;z-index:1}
.card .c-arrow span{
  font-size:var(--fs-caption);color:var(--text-quaternary);font-weight:400;
  transition:color var(--dur-fast),transform var(--dur-fast) var(--ease-fast);
  display:inline-block;
}
.card:hover .c-arrow span{color:var(--text-secondary);transform:translateX(2px)}
.card .c-arrow span::after{content:' →';margin-left:2px}

/* ===========================================
   DETAIL OVERLAY & SHEET
   =========================================== */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.38);
  display:flex;align-items:flex-end;justify-content:center;
  visibility:hidden;opacity:0;
  transition:visibility var(--dur-slow),opacity var(--dur-fast) var(--ease-fast);
}
.overlay.show{visibility:visible;opacity:1}
.overlay.show .sheet{transform:translateY(0)}

.sheet{
  background:var(--surface);
  border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  width:100%;max-width:720px;max-height:90vh;overflow-y:auto;
  padding:0;transform:translateY(100%);
  transition:transform 0.4s cubic-bezier(0.2,0.9,0.3,1);
  box-shadow:var(--shadow-sheet);
  border:1px solid var(--border);
  border-bottom:none;
}
.sheet::-webkit-scrollbar{width:3px}
.sheet::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:10px}
.sheet::-webkit-scrollbar-track{background:transparent}

.sheet-handle{
  display:flex;justify-content:center;padding:12px 0 0;
  position:sticky;top:0;z-index:5;
  background:var(--surface);
  border-radius:var(--radius-xl) var(--radius-xl) 0 0;
}
.sheet-handle::before{
  content:'';width:36px;height:4px;
  background:var(--gray-300);border-radius:10px;
}

.sheet-head{
  padding:var(--space-lg) var(--space-xl) var(--space-md);
  position:relative;
  border-bottom:1px solid var(--border-light);
}
.sheet-head .sh-name{
  font-size:1.5rem;font-weight:650;letter-spacing:-0.02em;line-height:var(--lh-tight);
  padding-right:40px;
}
.sheet-head .sh-trim{font-size:var(--fs-small);color:var(--text-tertiary);margin-top:4px;font-weight:400}
.sheet-head .sh-row{display:flex;gap:10px;align-items:center;margin-top:var(--space-sm)}

.sheet-close{
  position:absolute;top:var(--space-md);right:var(--space-md);
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:var(--surface);
  cursor:pointer;font-size:18px;color:var(--text-secondary);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--dur-micro) var(--ease-fast);
  line-height:1;
}
.sheet-close:hover{background:var(--surface-hover);color:var(--text-primary);border-color:var(--gray-300)}
.sheet-close:active{transform:scale(0.92)}

.sheet-price{
  margin:0 var(--space-xl);padding:var(--space-md) 0;
  border-bottom:1px solid var(--border-light);
  display:flex;align-items:baseline;gap:var(--space-sm);
}
.sheet-price .sp-num{
  font-size:1.75rem;font-weight:650;color:var(--price-color);
  letter-spacing:-0.03em;font-variant-numeric:tabular-nums;
}
.sheet-price .sp-note{font-size:var(--fs-caption);color:var(--text-tertiary);font-weight:400}

.sheet-block{
  padding:var(--space-md) var(--space-xl);
  border-bottom:1px solid var(--border-light);
}
.sheet-block .sb-label{
  font-size:var(--fs-tiny);font-weight:600;color:var(--text-tertiary);
  text-transform:uppercase;letter-spacing:0.06em;margin-bottom:var(--space-sm);
}
.sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px var(--space-lg)}
.sheet-grid .si{display:flex;justify-content:space-between;align-items:baseline;font-size:var(--fs-caption)}
.sheet-grid .si .l{color:var(--text-tertiary);font-size:var(--fs-caption);font-weight:400}
.sheet-grid .si .v{font-weight:550;text-align:right;color:var(--text-primary);font-variant-numeric:tabular-nums}

.sheet-range{
  display:flex;gap:var(--space-md);padding:var(--space-md) var(--space-xl);
  border-bottom:1px solid var(--border-light);
}
.sheet-range .rb{
  flex:1;text-align:center;padding:var(--space-md) var(--space-sm);
  border-radius:var(--radius-md);
  background:var(--surface-hover);
  transition:transform var(--dur-fast) var(--ease-fast),
             box-shadow var(--dur-fast) var(--ease-fast);
}
.sheet-range .rb:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.sheet-range .rb.blue{background:var(--accent-bg);color:var(--accent-text);border:0.5px solid var(--accent-border)}
.sheet-range .rb.green{background:var(--positive-bg);color:var(--positive);border:0.5px solid var(--positive-bg)}
.sheet-range .rb .n{font-size:1.5rem;font-weight:650;display:block;letter-spacing:-0.03em;font-variant-numeric:tabular-nums}
.sheet-range .rb .lbl{font-size:var(--fs-tiny);color:var(--text-tertiary);margin-top:2px;font-weight:500}

.sheet-pc{padding:var(--space-md) var(--space-xl);display:flex;gap:var(--space-lg)}
.sheet-pc .pc-col{flex:1;min-width:0}
.sheet-pc .pc-col .pc-title{
  font-size:var(--fs-caption);font-weight:600;
  margin-bottom:var(--space-sm);letter-spacing:-0.01em;
}
.sheet-pc .pc-col.pos .pc-title{color:var(--positive)}
.sheet-pc .pc-col.neg .pc-title{color:var(--negative)}
.sheet-pc .pc-col ul{list-style:none;padding:0}
.sheet-pc .pc-col li{
  font-size:var(--fs-caption);color:var(--text-secondary);
  padding:5px 0 5px 18px;position:relative;line-height:1.55;font-weight:400;
}
.sheet-pc .pc-col.pos li::before{
  content:'';position:absolute;left:0;top:10px;width:6px;height:6px;
  border-radius:50%;background:var(--positive);opacity:0.7;
}
.sheet-pc .pc-col.neg li::before{
  content:'';position:absolute;left:0;top:10px;width:6px;height:6px;
  border-radius:50%;background:var(--negative);opacity:0.6;
}

.sheet-foot{height:28px;background:var(--surface);border-radius:0 0 var(--radius-xl) var(--radius-xl)}

/* ===========================================
   COMPARISON TABLE
   =========================================== */
.table-section{
  margin-top:var(--space-3xl);padding-top:var(--space-xl);
  border-top:1px solid var(--border);
}
.table-section h2{
  font-size:var(--fs-h2);font-weight:600;
  text-align:center;letter-spacing:-0.02em;
}
.table-section .table-note{
  text-align:center;font-size:var(--fs-caption);color:var(--text-tertiary);
  margin:var(--space-xs) 0 var(--space-lg);
}
.table-wrap{
  overflow-x:auto;
  background:var(--surface);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-card);
}
table{width:100%;border-collapse:collapse;font-size:var(--fs-caption);min-width:1100px}
thead th{
  background:var(--surface-hover);
  padding:12px 10px;font-weight:600;font-size:var(--fs-tiny);
  color:var(--text-secondary);letter-spacing:0.03em;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:3;white-space:nowrap;text-align:center;
}
thead th:first-child{
  position:sticky;left:0;z-index:4;
  background:var(--surface);
  min-width:110px;text-align:left;
}
tbody td{
  padding:10px 10px;border-bottom:1px solid var(--border-light);
  vertical-align:middle;text-align:center;font-weight:400;
  color:var(--text-primary);
}
tbody td:first-child{
  font-weight:500;white-space:nowrap;position:sticky;left:0;
  background:var(--surface);z-index:2;text-align:left;
  color:var(--text-secondary);font-size:var(--fs-tiny);
}
tbody tr{transition:background var(--dur-micro)}
tbody tr:hover td{background:var(--surface-hover)}
tbody tr:hover td:first-child{background:var(--surface-hover)}
.car-col-name{font-weight:600;font-size:var(--fs-caption);white-space:nowrap;display:block}
.car-col-price{color:var(--price-color);font-weight:600;white-space:nowrap;font-variant-numeric:tabular-nums}

/* ===========================================
   FOOTER
   =========================================== */
.footer{
  text-align:center;padding:var(--space-2xl) var(--space-md) var(--space-lg);
  color:var(--text-quaternary);font-size:var(--fs-caption);
  line-height:1.9;font-weight:400;
}

/* ===========================================
   FOCUS VISIBLE — keyboard accessibility
   =========================================== */
:focus-visible{
  outline:2px solid var(--accent);
  outline-offset:2px;
  border-radius:var(--radius-sm);
}
.filter-btn:focus-visible,
.sheet-close:focus-visible{outline-offset:2px}

/* ===========================================
   REDUCED MOTION
   =========================================== */
@media (prefers-reduced-motion: reduce) {
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
    scroll-behavior:auto !important;
  }
  .card{opacity:1;transform:none}
  .card-grid.stagger-in .card{animation:none;opacity:1;transform:none}
}

/* ===========================================
   RESPONSIVE
   =========================================== */

/* Tablet: 2 cards per row */
@media (max-width: 1024px) {
  .card{grid-column:span 6}
  .container{padding:0 var(--space-md) var(--space-xl)}
  .sheet{max-width:640px}
}

  entries.forEach(function(entry){

    }
  });
}, {threshold:0.08, rootMargin:'0px 0px -30px 0px'});

    :list.map(function(c,i){
      var ks=cardKeySpecs(c);
      return '<div class="card '+c.tp+'" data-id="'+c.id+'" onclick="showDetail(\''+c.id+'\')" style="transition-delay:'+(i*0.05)+'s">'
        +'<div class="c-top">'
        +  '<div><div class="c-name">'+c.n+'</div><div class="c-trim">'+c.t+'</div></div>'
        +  badge(c.tp)
        +'</div>'
        +'<div class="c-price"><span class="yen">¥</span>'+c.pr+'</div>'
        +'<div class="c-specs">'
        +  ks.map(function(s){return '<div class="c-spec"><span class="l">'+s.l+'</span><span class="v">'+s.v+'</span></div>';}).join('')
        +'</div>'
        +'<div class="c-body"><span class="body-tag">'+c.bl+' · '+c.dl+'</span></div>'
        +'<div class="c-arrow"><span>查看详情</span></div>'
        +'</div>';
    }).join('');

  /* Observe new cards for scroll reveal */
  var cards = grid.querySelectorAll('.card');
  for(var i=0; i<cards.length; i++){
    revealObserver.observe(cards[i]);
  }
}

function showDetail(id){
  var c=C.find(function(x){return x.id===id;});
  if(!c) return;
  document.getElementById('overlay').classList.add('show');
  document.body.classList.add('detail-open');

  var html=''
    +'<div class="sheet-handle"></div>'
    +'<div class="sheet-head">'
    +  '<button class="sheet-close" onclick="hideDetail(event)" aria-label="关闭">&times;</button>'
    +  '<div class="sh-name">'+c.n+'</div>'
    +  '<div class="sh-trim">'+c.t+'</div>'
    +  '<div class="sh-row">'+badge(c.tp)+'<span style="font-size:var(--fs-caption);color:var(--text-tertiary);">'+c.bl+' · '+c.dl+'</span></div>'
    +'</div>'
    +'<div class="sheet-price"><span class="sp-num">¥'+c.pr+'</span><span class="sp-note">'+c.pn+'</span></div>'
    +'<div class="sheet-block">'
    +  '<div class="sb-label">基本参数</div>'
    +  '<div class="sheet-grid">'
    +    '<div class="si"><span class="l">长×宽×高</span><span class="v">'+c.ln+' × '+c.wd+' × '+c.ht+'</span></div>'
    +    '<div class="si"><span class="l">轴距</span><span class="v">'+c.wb+' mm</span></div>'
    +    '<div class="si"><span class="l">驱动方式</span><span class="v">'+c.dt+'</span></div>'
    +    '<div class="si"><span class="l">动力参数</span><span class="v">'+c.pw+'</span></div>'
    +    '<div class="si"><span class="l">0-100 加速</span><span class="v">'+c.ac+'</span></div>'
    +    '<div class="si"><span class="l">悬架系统</span><span class="v">'+c.su+'</span></div>'
    +  '</div>'
    +'</div>'
    +(c.er!=='—'||c.tr!=='—'
      ?'<div class="sheet-range">'
        +(c.er!=='—'?'<div class="rb blue"><span class="n">'+c.er+'</span><span class="lbl">纯电续航</span></div>':'')
        +(c.tr!=='—'?'<div class="rb green"><span class="n">'+c.tr+'</span><span class="lbl">综合续航</span></div>':'')
        +'</div>'
      :'')
    +(c.fc!=='—'
      ?'<div class="sheet-block"><div class="sb-label">能耗与电池</div><div class="sheet-grid"><div class="si"><span class="l">油耗 / 电耗</span><span class="v">'+c.fc+'</span></div><div class="si"><span class="l">电池</span><span class="v">'+c.ba+'</span></div></div></div>'
      :'')
    +'<div class="sheet-block"><div class="sb-label">智能配置</div><div style="font-size:var(--fs-caption);color:var(--text-secondary);font-weight:400;">'+c.sm+'</div></div>'
    +'<div class="sheet-pc">'
    +  '<div class="pc-col pos"><div class="pc-title">优点</div><ul>'+c.po.map(function(p){return '<li>'+p+'</li>';}).join('')+'</ul></div>'
    +  '<div class="pc-col neg"><div class="pc-title">不足</div><ul>'+c.co.map(function(p){return '<li>'+p+'</li>';}).join('')+'</ul></div>'
    +'</div>'
    +'<div class="sheet-foot"></div>';

  document.getElementById('sheet').innerHTML=html;
  document.getElementById('sheet').scrollTop=0;
  if(history.pushState) history.pushState(null,'','#'+c.id);
}

function hideDetail(e){
  if(e) e.stopPropagation();
  document.getElementById('overlay').classList.remove('show');
  document.body.classList.remove('detail-open');
  if(history.pushState) history.pushState(null,'',window.location.pathname);
}

document.getElementById('overlay').addEventListener('click',function(e){
  if(e.target===this) hideDetail(e);
});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape') hideDetail();
});

var touchY=0;
document.getElementById('sheet').addEventListener('touchstart',function(e){
  touchY=e.touches[0].clientY;
});
document.getElementById('sheet').addEventListener('touchmove',function(e){
  if(this.scrollTop>0) return;
  var dy=e.touches[0].clientY-touchY;
  if(dy>60) hideDetail(e);
});

window.addEventListener('popstate',function(){
  if(!location.hash) hideDetail();
  else{
    var id=location.hash.replace('#','');
    if(C.find(function(x){return x.id===id;})) showDetail(id);
  }
});

if(location.hash){
  var initId=location.hash.replace('#','');
  if(C.find(function(x){return x.id===initId;})) setTimeout(function(){showDetail(initId)},400);
}

function renderTable(){
  var cols=[
    {l:'动力类型',r:function(c){return badge(c.tp)}},
    {l:'车身',r:function(c){return c.bl}},
    {l:'落地价',r:function(c){return '<span class="car-col-price">'+c.pr+'</span>'}},
    {l:'长×宽×高 (mm)',r:function(c){return c.ln+' × '+c.wd+' × '+c.ht}},
    {l:'轴距 (mm)',r:function(c){return c.wb}},
    {l:'驱动方式',r:function(c){return c.dt}},
    {l:'动力参数',r:function(c){return c.pw}},
    {l:'0-100 加速',r:function(c){return c.ac}},
    {l:'纯电续航',r:function(c){return c.er}},
    {l:'综合续航',r:function(c){return c.tr}},
    {l:'油耗 / 电耗',r:function(c){return c.fc}},
    {l:'悬架',r:function(c){return c.su}},
    {l:'智能亮点',r:function(c){return c.sm}}
  ];
  var th='<thead><tr><th>参数项</th>'+C.map(function(c){return '<th><span class="car-col-name">'+c.n+'</span></th>';}).join('')+'</tr></thead>';
  var tb='<tbody>'+cols.map(function(col){return '<tr><td>'+col.l+'</td>'+C.map(function(c){return '<td>'+col.r(c)+'</td>';}).join('')+'</tr>';}).join('')+'</tbody>';
  document.getElementById('comparisonTable').innerHTML='<table>'+th+tb+'</table>';
}

document.querySelectorAll('.filter-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
    this.classList.add('active');
    renderGrid(this.dataset.filter);
  });
});

renderGrid();
renderTable();
</script>
</body>
</html>
