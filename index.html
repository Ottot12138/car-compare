  将图片URL替换到对应字段即可。建议使用绝对URL或同目录下的图片文件。

-->
<style>
:root {
  --bg: #f3f4f6;
  --card-bg: #fff;
  --text: #111827;
  --text-secondary: #6b7280;
  --border: #e5e7eb;
  --accent: #2563eb;
  --accent-dark: #1d4ed8;
  --accent-light: #eff6ff;
  --tag-bg: #f3f4f6;
  --pro-bg: #ecfdf5;
  --pro-text: #065f46;
  --pro-border: #a7f3d0;
  --con-bg: #fef2f2;
  --con-text: #991b1b;
  --con-border: #fecaca;
  --price-color: #dc2626;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-hover: 0 4px 16px rgba(0,0,0,.1);
  --radius: 14px;
  --radius-sm: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
.container { max-width:1340px; margin:0 auto; padding:16px; }

/* Header */
.header {
  text-align: center;
  padding: 36px 0 8px;
}
.header h1 {
  font-size: clamp(22px, 5vw, 34px);
  font-weight: 800;
  letter-spacing: -1px;
  background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header .subtitle {
  color: var(--text-secondary);
  margin-top: 8px;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}
.header .subtitle span { white-space: nowrap; }

/* Stats bar */
.stats-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin: 18px 0 8px;
}
.stat-item {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 6px 16px;
  font-size: 12px;
  color: var(--text-secondary);
  box-shadow: var(--shadow);
  white-space: nowrap;
}
.stat-item strong { color: var(--text); }

/* Filter bar */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin: 20px 0 24px;
  position: sticky;
  top: 8px;
  z-index: 100;
  background: rgba(243,244,246,.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 10px;
  border-radius: 24px;
}
.filter-btn {
  padding: 8px 18px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  transition: all .2s;
  white-space: nowrap;
  font-weight: 500;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }

/* Section title */
.section-title {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 32px 0 16px;
  font-size: 20px;
  font-weight: 700;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Card Grid */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(370px, 1fr));
  gap: 20px;
}

/* Card */
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow .25s, transform .2s;
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
}
.card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }

/* Image area - dual: exterior + interior */
.card-images {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
  height: 180px;
  background: #e5e7eb;
}
.card-img {
  background: linear-gradient(145deg, #e0e7ff 0%, #c7d2fe 40%, #ddd6fe 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  cursor: default;
}
.card-img.interior {
  background: linear-gradient(145deg, #fef3c7 0%, #fde68a 40%, #fcd34d 100%);
}
.card-img .img-label {
  position: absolute;
  top: 8px;
  left: 8px;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(0,0,0,.35);
  color: #fff;
  z-index: 2;
}
.card-img .img-overlay {
  font-size: 13px;
  color: rgba(255,255,255,.85);
  font-weight: 700;
  text-align: center;
  padding: 8px;
  z-index: 1;
  text-shadow: 0 1px 3px rgba(0,0,0,.4);
}
.card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
}

/* Card body */
.card-body { padding: 16px 18px 18px; flex:1; display:flex; flex-direction:column; }

.card-meta {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.type-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .3px;
}
.type-phev { background: #dbeafe; color: #1e40af; }
.type-ev { background: #dcfce7; color: #166534; }
.type-ice { background: #fff7ed; color: #9a3412; }
.type-hev { background: #f3e8ff; color: #6b21a8; }

.body-badge {
  font-size: 11px;
  color: #9ca3af;
  font-weight: 500;
}

.card-title {
  font-size: 19px;
  font-weight: 800;
  margin: 2px 0 0;
  letter-spacing: -.3px;
}
.card-subtitle {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

/* Price */
.price-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.price-tag {
  display: inline-flex;
  align-items: baseline;
  background: #fef2f2;
  color: var(--price-color);
  padding: 5px 12px;
  border-radius: 6px;
  font-weight: 700;
  font-size: 16px;
  border: 1px solid #fecaca;
}
.price-tag .unit { font-size: 12px; font-weight: 400; margin-right: 2px; }
.price-note { font-size: 11px; color: #9ca3af; }

/* Spec badges */
.spec-row {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-bottom: 14px;
}
.spec-badge {
  background: #f9fafb;
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 11.5px;
  color: var(--text-secondary);
  white-space: nowrap;
  border: 1px solid #f3f4f6;
}
.spec-badge strong { color: var(--text); font-weight: 600; }

/* Pros/cons toggle */
.toggle-section { margin-top: auto; }
.toggle-header {
  display: flex;
  gap: 10px;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}
.toggle-tab {
  flex: 1;
  text-align: center;
  padding: 7px 0;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12.5px;
  font-weight: 600;
  transition: all .2s;
  user-select: none;
  -webkit-user-select: none;
}
.toggle-tab:hover { opacity: .8; }
.toggle-tab.tab-pro { background: var(--pro-bg); color: var(--pro-text); border: 1px solid var(--pro-border); }
.toggle-tab.tab-con { background: var(--con-bg); color: var(--con-text); border: 1px solid var(--con-border); }
.toggle-tab.tab-inactive { background: transparent; color: #9ca3af; border: 1px solid transparent; }
.toggle-content {
  margin-top: 10px;
  font-size: 12.5px;
  line-height: 1.7;
  display: none;
  animation: fadeIn .2s;
}
.toggle-content.show { display: block; }
.toggle-content ul { padding-left: 18px; }
.toggle-content li { margin-bottom: 3px; color: #4b5563; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

/* No results */
.no-results {
  text-align: center;
  padding: 48px 0;
  color: var(--text-secondary);
  grid-column: 1 / -1;
}
.no-results .icon { font-size: 48px; margin-bottom: 12px; }

/* === COMPARISON TABLE === */
.table-section {
  margin-top: 44px;
}
.table-section h2 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
  text-align: center;
}
.table-section .table-note {
  text-align: center;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 16px;
}
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
  min-width: 1200px;
}
thead th {
  background: #f8fafc;
  padding: 12px 8px;
  text-align: left;
  font-weight: 700;
  font-size: 11.5px;
  color: var(--text-secondary);
  border-bottom: 2px solid #d1d5db;
  position: sticky;
  top: 0;
  z-index: 3;
  white-space: nowrap;
  text-align: center;
}
thead th:first-child {
  position: sticky;
  left: 0;
  z-index: 4;
  background: #f1f5f9;
  min-width: 130px;
  text-align: left;
}
tbody td {
  padding: 9px 8px;
  border-bottom: 1px solid #f3f4f6;
  vertical-align: middle;
  text-align: center;
}
tbody td:first-child {
  font-weight: 600;
  white-space: nowrap;
  position: sticky;
  left: 0;
  background: var(--card-bg);
  z-index: 2;
  text-align: left;
  color: var(--text-secondary);
  font-size: 12px;
}
tbody tr:hover td { background: #fafbfc; }
tbody tr:hover td:first-child { background: #fafbfc; }
.car-col-header {
  font-weight: 700;
  font-size: 13px;
  white-space: nowrap;
  display: block;
}
.car-col-trim {
  font-size: 10.5px;
  color: #9ca3af;
  white-space: nowrap;
  display: block;
}
.car-col-price {
  color: var(--price-color);
  font-weight: 700;
  white-space: nowrap;
}

/* Footer */
.footer {
  text-align: center;
  padding: 36px 16px;
  color: #9ca3af;
  font-size: 12px;
  line-height: 1.8;
}
.footer a { color: var(--accent); text-decoration: none; }

/* Print styles */
@media print {
  body { background: #fff; }
  .filter-bar, .stats-bar, .footer, .section-anchor { display: none; }
  .card { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
  .card-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .card-images { height: 140px; }
  .header { padding: 10px 0; }
}

/* Mobile */
@media (max-width: 768px) {
  .card-grid { grid-template-columns: 1fr; }
  .card-images { height: 200px; }
  .filter-bar { gap: 5px; }
  .filter-btn { padding: 6px 12px; font-size: 12px; }
  .header h1 { font-size: 22px; }
}
@media (max-width: 400px) {
  .card-grid { grid-template-columns: 1fr; }
  .card-images { height: 170px; }
}
</style>
</head>

// ========== RENDER ==========
const grid = document.getElementById('cardGrid');

function getTypeBadge(type) {
  const map = {
    phev: ['插混', 'type-phev'],
    ev: ['纯电', 'type-ev'],
    ice: ['燃油', 'type-ice'],
    hev: ['混动', 'type-hev']
  };
  const [label, cls] = map[type] || ['其他', ''];
  return `<span class="type-badge ${cls}">${label}</span>`;
}

function renderCards(filter = 'all') {
  const filtered = cars.filter(c => {
    if (filter === 'all') return true;
    if (['phev', 'ev', 'ice', 'hev'].includes(filter)) return c.type === filter;
    if (filter === 'sedan') return c.body === 'sedan';
    if (filter === 'suv') return c.body === 'suv';
    if (filter === 'wagon') return c.body === 'wagon' || c.body === 'hatchback';
    return true;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results"><div class="icon">🔍</div><p>没有匹配的车型，换一个筛选条件试试</p></div>';
    return;
  }

  grid.innerHTML = filtered.map((c, i) => {
    const idBase = c.id + '-' + i;
    const extImg = c.imgExterior
      ? `<img src="${c.imgExterior}" alt="${c.name} 外观" loading="lazy" onerror="this.style.display='none'">`
      : '';
    const intImg = c.imgInterior
      ? `<img src="${c.imgInterior}" alt="${c.name} 内饰" loading="lazy" onerror="this.style.display='none'">`
      : '';
    return `
    <div class="card">
      <div class="card-images">
        <div class="card-img" style="background:linear-gradient(135deg, ${c.color1}, ${c.color2});">
          <span class="img-label">外观</span>
          ${extImg}
          <div class="img-overlay">
            <div style="font-size:40px;margin-bottom:2px;opacity:.6;">🚗</div>
            ${c.name} 外观
          </div>
        </div>
        <div class="card-img interior" style="background:linear-gradient(135deg, #3d2b1f, #6b5035);">
          <span class="img-label">内饰</span>
          ${intImg}
          <div class="img-overlay">
            <div style="font-size:40px;margin-bottom:2px;opacity:.6;">🛋️</div>
            ${c.name} 内饰
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-meta">
          ${getTypeBadge(c.type)}
          <span class="body-badge">${c.bodyLabel} · ${c.dtLabel}</span>
        </div>
        <div class="card-title">${c.name}</div>
        <div class="card-subtitle">${c.trim}</div>

        <div class="price-row">
          <span class="price-tag"><span class="unit">¥</span>${c.price}</span>
          <span class="price-note">${c.priceNote}</span>
        </div>

        <div class="spec-row">
          <span class="spec-badge">📐 <strong>${c.length}×${c.width}×${c.height}</strong></span>
          <span class="spec-badge">轴距 <strong>${c.wheelbase}mm</strong></span>
          ${c.evRange !== '—' ? `<span class="spec-badge">🔋 纯电 <strong>${c.evRange}</strong></span>` : ''}
          ${c.totalRange !== '—' ? `<span class="spec-badge">🛣 综合 <strong>${c.totalRange}</strong></span>` : ''}
          <span class="spec-badge">⚡ 加速 <strong>${c.accel}</strong></span>
          <span class="spec-badge">🔧 <strong>${c.drivetrain}</strong></span>
        </div>

        <div class="toggle-section">
          <div class="toggle-header">
            <div class="toggle-tab tab-pro" onclick="togglePC(this, 'pro-${idBase}')">✅ 优点 (${c.pros.length})</div>
            <div class="toggle-tab tab-inactive" onclick="togglePC(this, 'con-${idBase}')">⚠️ 不足 (${c.cons.length})</div>
          </div>
          <div class="toggle-content show" id="pro-${idBase}">
            <ul>${c.pros.map(p => `<li>${p}</li>`).join('')}</ul>
          </div>
          <div class="toggle-content" id="con-${idBase}">
            <ul>${c.cons.map(p => `<li>${p}</li>`).join('')}</ul>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

window.togglePC = function(btn, targetId) {
  const parent = btn.parentElement.parentElement;
  parent.querySelectorAll('.toggle-tab').forEach(t => { t.className = 'toggle-tab tab-inactive'; });
  parent.querySelectorAll('.toggle-content').forEach(c => { c.classList.remove('show'); });

  const isPro = targetId.startsWith('pro-');
  btn.className = 'toggle-tab ' + (isPro ? 'tab-pro' : 'tab-con');
  document.getElementById(targetId).classList.add('show');
};

// ========== COMPARISON TABLE ==========
function renderTable() {
  const cols = [
    { key: 'name', label: '车型', render: (c) => `<span class="car-col-header">${c.name}</span><span class="car-col-trim">${c.trim}</span>` },
    { key: 'type', label: '动力', render: (c) => getTypeBadge(c.type) },
    { key: 'body', label: '车身', render: (c) => c.bodyLabel },
    { key: 'price', label: '指导/优惠价', render: (c) => `<span class="car-col-price">${c.price}</span>` },
    { key: 'size', label: '长×宽×高(mm)', render: (c) => `${c.length}×${c.width}×${c.height}` },
    { key: 'wheelbase', label: '轴距(mm)', render: (c) => c.wheelbase },
    { key: 'drivetrain', label: '驱动方式', render: (c) => c.drivetrain },
    { key: 'power', label: '动力参数', render: (c) => c.power },
    { key: 'accel', label: '0-100加速', render: (c) => c.accel },
    { key: 'evRange', label: '纯电续航', render: (c) => c.evRange },
    { key: 'totalRange', label: '综合续航', render: (c) => c.totalRange },
    { key: 'fuel', label: '油耗/电耗', render: (c) => c.fuelConsumption },
    { key: 'suspension', label: '悬架系统', render: (c) => c.suspension },
    { key: 'smart', label: '智能亮点', render: (c) => c.smart },
  ];

  const thead = `<thead><tr><th>参数项</th>${cars.map(c => `<th><span class="car-col-header">${c.name}</span></th>`).join('')}</tr></thead>`;
  const tbody = `<tbody>${cols.map(col =>
    `<tr><td>${col.label}</td>${cars.map(c => `<td>${col.render(c)}</td>`).join('')}</tr>`
  ).join('')}</tbody>`;

  document.getElementById('comparisonTable').innerHTML = `<table>${thead}${tbody}</table>`;
}

// ========== FILTER ==========
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    renderCards(this.dataset.filter);
  });
});

// ========== INIT ==========
renderCards();
renderTable();
</script>

</body>
