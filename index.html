<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热门车型对比 · 2026年7月</title>
<style>
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface2: #fafafa;
  --text: #1d1d1f;
  --text2: #6e6e73;
  --text3: #aeaeb2;
  --border: #e5e5ea;
  --border2: #f0f0f2;
  --blue: #0071e3;
  --blue-bg: #e8f1fb;
  --green-bg: #e8f5e9;
  --orange-bg: #fff3e0;
  --red: #c62828;
  --shadow-sm: 0 0.5px 1px rgba(0,0,0,.03), 0 1px 3px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,.06), 0 1px 4px rgba(0,0,0,.03);
  --shadow-lg: 0 16px 48px rgba(0,0,0,.10), 0 2px 8px rgba(0,0,0,.04);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 24px;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { -webkit-font-smoothing:antialiased; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.47059;
  letter-spacing: -.016em;
}
body.detail-open { overflow:hidden; }

.container { max-width:1400px; margin:0 auto; padding:20px 24px 40px; }

/* ── Header ── */
.header { text-align:center; padding:56px 16px 24px; }
.header h1 { font-size:clamp(28px,5vw,42px); font-weight:700; letter-spacing:-.03em; }
.header .subtitle { color:var(--text2); margin-top:6px; font-size:14px; font-weight:460; }

/* ── Stats ── */
.stats-bar { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:20px 0 16px; }
.stat-item { background:var(--surface); border-radius:100px; padding:6px 16px; font-size:12px; color:var(--text2); font-weight:500; box-shadow:var(--shadow-sm); border:0.5px solid var(--border2); }
.stat-item strong { color:var(--text); font-weight:600; }

/* ── Filter ── */
.filter-wrap { position:sticky; top:12px; z-index:50; margin-bottom:32px; }
.filter-bar { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; background:rgba(245,245,247,.78); backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%); border-radius:100px; padding:8px; border:0.5px solid rgba(0,0,0,.06); box-shadow:var(--shadow-sm); max-width:fit-content; margin:0 auto; }
.filter-btn { padding:9px 18px; border:none; background:transparent; border-radius:100px; cursor:pointer; font-size:13px; color:var(--text2); font-weight:520; white-space:nowrap; transition:all .22s var(--ease-out); letter-spacing:-.01em; font-family:inherit; }
.filter-btn:hover { color:var(--text); background:rgba(0,0,0,.04); }
.filter-btn.active { background:var(--text); color:#fff; box-shadow:0 2px 8px rgba(0,0,0,.15); }

/* ── Card Grid ── */
.card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:18px; }
.card-grid.fade-in { animation: fadeUp .45s var(--ease-out) .05s both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

/* ── Card (compact, minimal) ── */
.card {
  background:var(--surface); border-radius:var(--radius-lg);
  padding:24px; cursor:pointer;
  box-shadow:var(--shadow-sm); border:0.5px solid var(--border2);
  transition: box-shadow .3s var(--ease-out), transform .3s var(--ease-out);
  position:relative; overflow:hidden;
  display:flex; flex-direction:column; gap:16px;
}
.card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
.card:active { transform:scale(.985); transition:transform .1s var(--ease-out); }
.card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.card.phev::before { background:linear-gradient(90deg,#2979ff,#82b1ff); }
.card.ev::before   { background:linear-gradient(90deg,#2e7d32,#66bb6a); }
.card.ice::before  { background:linear-gradient(90deg,#e65100,#ff9800); }

/* Card header row */
.card .c-top { display:flex; justify-content:space-between; align-items:flex-start; }
.card .c-name { font-size:18px; font-weight:660; letter-spacing:-.025em; line-height:1.2; }
.card .c-trim { font-size:12px; color:var(--text2); margin-top:2px; font-weight:460; }
.badge { display:inline-block; padding:3px 10px; border-radius:100px; font-size:11px; font-weight:620; letter-spacing:.01em; white-space:nowrap; }
.badge.phev { background:var(--blue-bg); color:#1565c0; }
.badge.ev   { background:var(--green-bg); color:#2e7d32; }
.badge.ice  { background:var(--orange-bg); color:#bf360c; }

/* Card price */
.card .c-price { font-size:24px; font-weight:720; color:var(--red); letter-spacing:-.03em; }
.card .c-price .yen { font-size:15px; font-weight:580; margin-right:1px; }

/* Card key specs - 2 rows */
.card .c-specs { display:grid; grid-template-columns:1fr 1fr; gap:6px 12px; }
.card .c-spec { display:flex; justify-content:space-between; font-size:12px; }
.card .c-spec .l { color:var(--text3); font-weight:460; }
.card .c-spec .v { font-weight:560; text-align:right; }

/* Card body tag row */
.card .c-body { display:flex; gap:8px; align-items:center; }
.card .c-body .body-tag { font-size:11px; color:var(--text3); background:var(--surface2); padding:3px 10px; border-radius:100px; font-weight:500; }

/* Card arrow hint */
.card .c-arrow { text-align:right; margin-top:auto; }
.card .c-arrow span { font-size:11px; color:var(--text3); font-weight:500; }
.card .c-arrow span::after { content:' →'; }

/* ── Detail Overlay ── */
.overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,.35); backdrop-filter:blur(8px);
  display:flex; align-items:flex-end; justify-content:center;
  visibility:hidden; opacity:0; transition:visibility .35s, opacity .35s var(--ease-out);
}
.overlay.show { visibility:visible; opacity:1; }
.overlay.show .sheet { transform:translateY(0); }

.sheet {
  background:var(--surface); border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  width:100%; max-width:720px; max-height:88vh; overflow-y:auto;
  padding:0; transform:translateY(100%);
  transition:transform .42s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow:var(--shadow-lg);
}
.sheet::-webkit-scrollbar { width:4px; }
.sheet::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }

/* Sheet handle */
.sheet-handle { display:flex; justify-content:center; padding:12px 0 0; position:sticky; top:0; background:var(--surface); z-index:5; border-radius:var(--radius-xl) var(--radius-xl) 0 0; }
.sheet-handle::before { content:''; width:36px; height:4px; background:var(--border); border-radius:10px; }

/* Sheet header */
.sheet-head { padding:20px 28px 18px; position:relative; border-bottom:0.5px solid var(--border2); }
.sheet-head .sh-name { font-size:24px; font-weight:710; letter-spacing:-.03em; }
.sheet-head .sh-trim { font-size:13px; color:var(--text2); margin-top:3px; }
.sheet-head .sh-row { display:flex; gap:8px; align-items:center; margin-top:10px; }
.sheet-close {
  position:absolute; top:18px; right:18px;
  width:32px; height:32px; border-radius:50%;
  border:none; background:var(--surface2);
  cursor:pointer; font-size:16px; color:var(--text2);
  display:flex; align-items:center; justify-content:center;
  transition:background .2s;
}
.sheet-close:hover { background:#e8e8ed; }

/* Sheet price */
.sheet-price { margin:0 28px; padding:16px 0; border-bottom:0.5px solid var(--border2); display:flex; align-items:baseline; gap:10px; }
.sheet-price .sp-num { font-size:28px; font-weight:720; color:var(--red); letter-spacing:-.03em; }
.sheet-price .sp-note { font-size:12px; color:var(--text3); font-weight:460; }

/* Sheet spec block */
.sheet-block { padding:18px 28px; border-bottom:0.5px solid var(--border2); }
.sheet-block .sb-label { font-size:10px; font-weight:640; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; }
.sheet-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px 24px; }
.sheet-grid .si { display:flex; justify-content:space-between; align-items:baseline; font-size:13px; }
.sheet-grid .si .l { color:var(--text2); font-size:12px; }
.sheet-grid .si .v { font-weight:580; text-align:right; }

/* Sheet range */
.sheet-range { display:flex; gap:12px; padding:18px 28px; border-bottom:0.5px solid var(--border2); }
.sheet-range .rb { flex:1; text-align:center; padding:14px 8px; border-radius:var(--radius-md); background:var(--surface2); }
.sheet-range .rb.blue  { background:#f3f7fd; }
.sheet-range .rb.green { background:#f1f8f4; }
.sheet-range .rb .n { font-size:26px; font-weight:720; display:block; letter-spacing:-.03em; }
.sheet-range .rb.blue .n  { color:#1565c0; }
.sheet-range .rb.green .n { color:#2e7d32; }
.sheet-range .rb .lbl { font-size:10px; color:var(--text3); margin-top:3px; font-weight:520; }

/* Sheet pros/cons */
.sheet-pc { padding:18px 28px; display:flex; gap:12px; }
.sheet-pc .pc-col { flex:1; min-width:0; }
.sheet-pc .pc-col .pc-title { font-size:12px; font-weight:640; margin-bottom:9px; }
.sheet-pc .pc-col.pos .pc-title { color:#2e7d32; }
.sheet-pc .pc-col.neg .pc-title { color:#c62828; }
.sheet-pc .pc-col ul { list-style:none; padding:0; }
.sheet-pc .pc-col li { font-size:12px; color:#4a4a50; padding:3px 0 3px 16px; position:relative; line-height:1.5; font-weight:440; }
.sheet-pc .pc-col.pos li::before { content:''; position:absolute; left:0; top:9px; width:6px; height:6px; border-radius:50%; background:#66bb6a; }
.sheet-pc .pc-col.neg li::before { content:''; position:absolute; left:0; top:9px; width:6px; height:6px; border-radius:50%; background:#ef5350; }

.sheet-foot { height:32px; }

/* ── Table Section ── */
.table-section { margin-top:48px; padding-top:32px; border-top:0.5px solid var(--border); }
.table-section h2 { font-size:20px; font-weight:640; text-align:center; letter-spacing:-.02em; }
.table-section .table-note { text-align:center; font-size:12px; color:var(--text3); margin:4px 0 16px; }
.table-wrap { overflow-x:auto; background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); border:0.5px solid var(--border2); }
table { width:100%; border-collapse:collapse; font-size:12px; min-width:1200px; }
thead th { background:var(--surface2); padding:12px 8px; font-weight:620; font-size:11px; color:var(--text2); letter-spacing:.02em; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:3; white-space:nowrap; text-align:center; }
thead th:first-child { position:sticky; left:0; z-index:4; background:#f0f0f2; min-width:120px; text-align:left; }
tbody td { padding:10px 8px; border-bottom:0.5px solid var(--border2); vertical-align:middle; text-align:center; font-weight:440; }
tbody td:first-child { font-weight:580; white-space:nowrap; position:sticky; left:0; background:var(--surface); z-index:2; text-align:left; color:var(--text2); font-size:11px; }
tbody tr:hover td { background:#fafafa; } tbody tr:hover td:first-child { background:#fafafa; }
.car-col-name { font-weight:620; font-size:13px; white-space:nowrap; display:block; }
.car-col-price { color:var(--red); font-weight:640; white-space:nowrap; }

/* ── Footer ── */
.footer { text-align:center; padding:40px 16px 32px; color:var(--text3); font-size:12px; line-height:1.8; font-weight:440; }

/* ── Responsive ── */
@media (max-width:720px) {
  .card-grid { grid-template-columns:1fr; }
  .container { padding:12px 12px 32px; }
  .header { padding-top:36px; }
  .header h1 { font-size:24px; }
  .filter-bar { border-radius:var(--radius-lg); max-width:100%; }
  .sheet { max-height:92vh; }
  .sheet-head, .sheet-price, .sheet-block, .sheet-range, .sheet-pc { padding-left:20px; padding-right:20px; }
  .sheet-grid { grid-template-columns:1fr 1fr; gap:7px 12px; }
}
@media print { body{background:#fff} .filter-wrap,.stats-bar,.footer{display:none} .card{break-inside:avoid;box-shadow:none;border:0.5px solid #ddd} .card-grid{grid-template-columns:repeat(2,1fr);gap:12px} }
</style>
</head>

/* ── Helpers ── */
function badge(tp) {
  var m = { phev: ['插混','phev'], ev: ['纯电','ev'], ice: ['燃油','ice'] };
  var a = m[tp] || ['',''];
  return '<span class="badge '+a[1]+'">'+a[0]+'</span>';
}

/* ── Key specs displayed on card (pick 2 most relevant) ── */
function cardKeySpecs(c) {
  var specs = [];
  if (c.er !== '—') specs.push({ l: '续航', v: c.er });
  if (c.ac) specs.push({ l: '0-100', v: c.ac });
  if (c.tr !== '—' && specs.length < 2) specs.push({ l: '综合续航', v: c.tr });
  if (specs.length < 2 && c.pw) specs.push({ l: '动力', v: c.pw.split('(')[0] });
  return specs;
}

/* ── Render Card Grid ── */
function renderGrid(filter) {
  filter = filter || 'all';
  var list = C.filter(function(c) {
    if (filter === 'all') return true;
    if (filter === 'phev' || filter === 'ev' || filter === 'ice') return c.tp === filter;
    if (filter === 'sedan') return c.bd === 'sedan';
    if (filter === 'suv') return c.bd === 'suv';
    if (filter === 'wagon') return c.bd === 'wagon' || c.bd === 'hatchback';
    return true;
  });

  var grid = document.getElementById('cardGrid');
  grid.classList.remove('fade-in');
  void grid.offsetWidth;
  grid.classList.add('fade-in');

  grid.innerHTML = !list.length
    ? '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text3);font-size:15px;">没有匹配的车型</div>'
    : list.map(function(c) {
        var ks = cardKeySpecs(c);
        return '<div class="card '+c.tp+'" data-id="'+c.id+'" onclick="showDetail(\''+c.id+'\')">'
          + '<div class="c-top">'
          +   '<div><div class="c-name">'+c.n+'</div><div class="c-trim">'+c.t+'</div></div>'
          +   badge(c.tp)
          + '</div>'
          + '<div class="c-price"><span class="yen">¥</span>'+c.pr+'</div>'
          + '<div class="c-specs">'
          +   ks.map(function(s){ return '<div class="c-spec"><span class="l">'+s.l+'</span><span class="v">'+s.v+'</span></div>'; }).join('')
          + '</div>'
          + '<div class="c-body"><span class="body-tag">'+c.bl+' · '+c.dl+'</span></div>'
          + '<div class="c-arrow"><span>查看详情</span></div>'
          + '</div>';
      }).join('');
}

/* ── Detail Sheet ── */
function showDetail(id) {
  var c = C.find(function(x){ return x.id === id; });
  if (!c) return;
  document.getElementById('overlay').classList.add('show');
  document.body.classList.add('detail-open');

  var html = ''
    + '<div class="sheet-handle"></div>'
    + '<div class="sheet-head">'
    +   '<button class="sheet-close" onclick="hideDetail(event)" aria-label="关闭">&times;</button>'
    +   '<div class="sh-name">'+c.n+'</div>'
    +   '<div class="sh-trim">'+c.t+'</div>'
    +   '<div class="sh-row">'+badge(c.tp)+'<span style="font-size:11px;color:var(--text3);">'+c.bl+' · '+c.dl+'</span></div>'
    + '</div>'
    + '<div class="sheet-price"><span class="sp-num">¥'+c.pr+'</span><span class="sp-note">'+c.pn+'</span></div>'
    + '<div class="sheet-block">'
    +   '<div class="sb-label">基本参数</div>'
    +   '<div class="sheet-grid">'
    +     '<div class="si"><span class="l">长×宽×高</span><span class="v">'+c.ln+' × '+c.wd+' × '+c.ht+'</span></div>'
    +     '<div class="si"><span class="l">轴距</span><span class="v">'+c.wb+' mm</span></div>'
    +     '<div class="si"><span class="l">驱动方式</span><span class="v">'+c.dt+'</span></div>'
    +     '<div class="si"><span class="l">动力参数</span><span class="v">'+c.pw+'</span></div>'
    +     '<div class="si"><span class="l">0-100 加速</span><span class="v">'+c.ac+'</span></div>'
    +     '<div class="si"><span class="l">悬架系统</span><span class="v">'+c.su+'</span></div>'
    +   '</div>'
    + '</div>'
    + (c.er !== '—' || c.tr !== '—'
        ? '<div class="sheet-range">'
          + (c.er !== '—' ? '<div class="rb blue"><span class="n">'+c.er+'</span><span class="lbl">纯电续航</span></div>' : '')
          + (c.tr !== '—' ? '<div class="rb green"><span class="n">'+c.tr+'</span><span class="lbl">综合续航</span></div>' : '')
          + '</div>'
        : '')
    + (c.fc !== '—'
        ? '<div class="sheet-block"><div class="sb-label">能耗与电池</div><div class="sheet-grid"><div class="si"><span class="l">油耗 / 电耗</span><span class="v">'+c.fc+'</span></div><div class="si"><span class="l">电池</span><span class="v">'+c.ba+'</span></div></div></div>'
        : '')
    + '<div class="sheet-block"><div class="sb-label">智能配置</div><div style="font-size:12px;color:#4a4a50;font-weight:440;">'+c.sm+'</div></div>'
    + '<div class="sheet-pc">'
    +   '<div class="pc-col pos"><div class="pc-title">✓ 优点</div><ul>'+c.po.map(function(p){return '<li>'+p+'</li>';}).join('')+'</ul></div>'
    +   '<div class="pc-col neg"><div class="pc-title">✗ 不足</div><ul>'+c.co.map(function(p){return '<li>'+p+'</li>';}).join('')+'</ul></div>'
    + '</div>'
    + '<div class="sheet-foot"></div>';

  document.getElementById('sheet').innerHTML = html;
  document.getElementById('sheet').scrollTop = 0;

  // update hash
  if (history.pushState) history.pushState(null, '', '#'+c.id);
}

function hideDetail(e) {
  if (e) e.stopPropagation();
  document.getElementById('overlay').classList.remove('show');
  document.body.classList.remove('detail-open');
  if (history.pushState) history.pushState(null, '', window.location.pathname);
}

// Close on overlay click (not sheet click)
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) hideDetail(e);
});

// Close on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') hideDetail();
});

// Swipe down to close (touch)
var touchY = 0;
document.getElementById('sheet').addEventListener('touchstart', function(e) {
  touchY = e.touches[0].clientY;
});
document.getElementById('sheet').addEventListener('touchmove', function(e) {
  if (this.scrollTop > 0) return;
  var dy = e.touches[0].clientY - touchY;
  if (dy > 60) { hideDetail(e); }
});

// Back button support
window.addEventListener('popstate', function() {
  if (!location.hash) hideDetail();
  else {
    var id = location.hash.replace('#','');
    if (C.find(function(x){ return x.id === id; })) showDetail(id);
  }
});

// Load from hash on init
if (location.hash) {
  var initId = location.hash.replace('#','');
  if (C.find(function(x){ return x.id === initId; })) {
    setTimeout(function(){ showDetail(initId); }, 300);
  }
}

/* ── Render Table ── */
function renderTable() {
  var cols = [
    {l:'动力类型', r:function(c){return badge(c.tp);}},
    {l:'车身', r:function(c){return c.bl;}},
    {l:'落地价', r:function(c){return '<span class="car-col-price">'+c.pr+'</span>';}},
    {l:'长×宽×高 (mm)', r:function(c){return c.ln+' × '+c.wd+' × '+c.ht;}},
    {l:'轴距 (mm)', r:function(c){return c.wb;}},
    {l:'驱动方式', r:function(c){return c.dt;}},
    {l:'动力参数', r:function(c){return c.pw;}},
    {l:'0-100 加速', r:function(c){return c.ac;}},
    {l:'纯电续航', r:function(c){return c.er;}},
    {l:'综合续航', r:function(c){return c.tr;}},
    {l:'油耗 / 电耗', r:function(c){return c.fc;}},
    {l:'悬架', r:function(c){return c.su;}},
    {l:'智能亮点', r:function(c){return c.sm;}}
  ];
  var th = '<thead><tr><th>参数项</th>'+C.map(function(c){return '<th><span class="car-col-name">'+c.n+'</span></th>';}).join('')+'</tr></thead>';
  var tb = '<tbody>'+cols.map(function(col){return '<tr><td>'+col.l+'</td>'+C.map(function(c){return '<td>'+col.r(c)+'</td>';}).join('')+'</tr>';}).join('')+'</tbody>';
  document.getElementById('comparisonTable').innerHTML = '<table>'+th+tb+'</table>';
}

/* ── Filter Events ── */
document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    this.classList.add('active');
    renderGrid(this.dataset.filter);
  });
});

/* ── Init ── */
renderGrid();
renderTable();
